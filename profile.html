<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Inst-Album - Profilo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="profile-body">
  <header class="profile-header">
    <h1 class="profile-title">Il tuo profilo</h1>

    <div class="menu-container">
      <button class="menu-button" id="menuButton">⋮</button>
      <div class="dropdown-menu hidden" id="dropdownMenu">
        <button id="logoutBtn">Logout</button>
      </div>
    </div>
  </header>

  <!-- FOTO PROFILO + BIO -->
  <section class="profile-section">
    <img
      id="profilePic"
      class="profile-pic"
      src="https://via.placeholder.com/140"
      alt="Foto profilo"
    />
    <button id="changePicBtn" class="change-pic-btn">Cambia foto profilo</button>
    <input
      type="file"
      id="profilePicInput"
      accept="image/*"
      style="display: none"
    />
  </section>

  <section class="bio-section">
    <textarea
      id="bioInput"
      class="bio-input"
      placeholder="Scrivi qualcosa su di te..."
    ></textarea>
    <button id="saveBioBtn" class="save-bio-btn">Salva bio</button>
  </section>

  <!-- HIGHLIGHTS / FRIENDS -->
  <section class="highlights-section">
    <h2 class="highlights-title">Friends (Highlights)</h2>
    <div class="highlights-row" id="highlightsRow">
      <div class="highlight-item new-highlight" id="newHighlightBtn">
        <div class="highlight-circle">+</div>
        <span class="highlight-label">Nuovo</span>
      </div>
    </div>
  </section>

  <!-- GALLERIA RICORDI (POST) -->
  <section class="gallery-section">
    <h2 class="gallery-title">Ricordi</h2>
    <div class="ricordi-grid" id="ricordiGrid"></div>
  </section>

  <!-- PULSANTE FLOTANTE + PER NUOVO RICORDO -->
  <button id="addRicordoBtn" class="floating-add-btn">+</button>

  <!-- MODAL NUOVO RICORDO -->
  <div id="newRicordoModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="ricordo-modal-content">
      <button id="closeNewRicordoModal" class="modal-close">✖</button>
      <h2>Nuovo Ricordo ✨</h2>

      <label class="modal-label">Copertina</label>
      <input type="file" id="modalCoverInput" accept="image/*" />

      <label class="modal-label">Foto interne</label>
      <input type="file" id="modalPhotosInput" accept="image/*" multiple />

      <label class="modal-label">Didascalia</label>
      <textarea
        id="modalCaption"
        class="modal-textarea"
        placeholder="Scrivi un ricordo..."
      ></textarea>

      <button id="modalPublishBtn" class="modal-primary-btn">Pubblica</button>
    </div>
  </div>

  <!-- MODAL VISUALIZZAZIONE RICORDO -->
  <div id="ricordoModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="ricordo-modal-content">
      <button id="closeRicordoModal" class="modal-close">✖</button>

      <div class="carousel-container" id="ricordoModalCarousel"></div>

      <p id="ricordoModalCaption" class="ricordo-modal-caption"></p>
      <p id="ricordoModalDate" class="ricordo-modal-date"></p>
    </div>
  </div>

  <!-- MODAL VISUALIZZAZIONE HIGHLIGHT -->
  <div id="highlightModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="ricordo-modal-content">
      <button id="closeHighlightModal" class="modal-close">✖</button>

      <div class="carousel-container" id="highlightModalCarousel"></div>
      <p id="highlightModalTitle" class="ricordo-modal-caption"></p>
    </div>
  </div>

  <!-- MODAL CREAZIONE HIGHLIGHT -->
  <div id="newHighlightModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="ricordo-modal-content">
      <button id="closeNewHighlightModal" class="modal-close">✖</button>
      <h2>Nuovo Highlight 💫</h2>

      <label class="modal-label">Nome</label>
      <input type="text" id="highlightTitleInput" class="modal-input" />

      <label class="modal-label">Copertina</label>
      <input type="file" id="highlightCoverInput" accept="image/*" />

      <label class="modal-label">Foto interne</label>
      <input type="file" id="highlightPhotosInput" accept="image/*" multiple />

      <button id="createHighlightBtn" class="modal-primary-btn">
        Crea Highlight
      </button>
    </div>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="profile.js"></script>
</body>
</html>
